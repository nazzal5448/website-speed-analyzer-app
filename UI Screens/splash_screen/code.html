<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cyfrow Website Speed Analyzer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Geist:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#cfbcff",
                        "on-tertiary-fixed": "#241a00",
                        "inverse-primary": "#6750a4",
                        "on-primary": "#381e72",
                        "error": "#ffb4ab",
                        "on-tertiary-container": "#503d00",
                        "on-error": "#690005",
                        "on-surface-variant": "#cbc4d2",
                        "background": "#141218",
                        "surface-bright": "#3b383e",
                        "tertiary-fixed": "#ffdf93",
                        "error-container": "#93000a",
                        "on-background": "#e6e0e9",
                        "on-primary-fixed": "#22005d",
                        "primary-fixed": "#e9ddff",
                        "surface-container": "#211f24",
                        "primary-container": "#6750a4",
                        "outline-variant": "#494551",
                        "primary": "#cfbcff",
                        "on-secondary-container": "#bfb2da",
                        "inverse-surface": "#e6e0e9",
                        "surface-container-highest": "#36343a",
                        "outline": "#948e9c",
                        "secondary-fixed": "#e9ddff",
                        "on-secondary-fixed": "#1f1635",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#4b4263",
                        "surface-container-low": "#1d1b20",
                        "on-secondary": "#342b4b",
                        "secondary-container": "#4d4465",
                        "secondary": "#cdc0e9",
                        "surface-container-lowest": "#0f0d13",
                        "on-tertiary": "#3e2e00",
                        "secondary-fixed-dim": "#cdc0e9",
                        "surface": "#141218",
                        "tertiary": "#e7c365",
                        "surface-tint": "#cfbcff",
                        "surface-variant": "#36343a",
                        "on-primary-container": "#e0d2ff",
                        "on-tertiary-fixed-variant": "#594400",
                        "on-surface": "#e6e0e9",
                        "tertiary-container": "#c9a74d",
                        "surface-container-high": "#2b292f",
                        "surface-dim": "#141218",
                        "on-primary-fixed-variant": "#4f378a",
                        "tertiary-fixed-dim": "#e7c365",
                        "inverse-on-surface": "#322f35"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "stack-sm": "8px",
                        "stack-xl": "64px",
                        "container-max": "1280px",
                        "margin-desktop": "40px",
                        "stack-lg": "32px",
                        "stack-xs": "4px",
                        "gutter": "24px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "label-mono": ["JetBrains Mono"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Geist"],
                        "body-md": ["Inter"],
                        "display-xl": ["Geist"],
                        "headline-lg": ["Geist"],
                        "display-xl-mobile": ["Geist"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-mono": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-xl": ["64px", {"lineHeight": "72px", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "display-xl-mobile": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .radial-glow {
            background: radial-gradient(circle at center, rgba(207, 188, 255, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
        }
        .logo-glow {
            filter: drop-shadow(0 0 25px rgba(207, 188, 255, 0.4));
        }
        .spinner-glow {
            box-shadow: 0 0 15px rgba(207, 188, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#000000] text-on-surface overflow-hidden">
<!-- Splash Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center radial-glow">
<!-- Background Texture Layer -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px;">
</div>
<!-- Center Content Group -->
<div class="z-10 flex flex-col items-center text-center px-margin-mobile">
<!-- Abstract Speed Icon -->
<div class="relative mb-stack-lg flex items-center justify-center logo-glow">
<div class="absolute w-24 h-24 bg-primary/10 rounded-full blur-2xl"></div>
<span class="material-symbols-outlined text-primary text-[80px] leading-none select-none" data-icon="speed" style="font-variation-settings: 'FILL' 1;">
                    speed
                </span>
</div>
<!-- Brand Typography -->
<div class="flex flex-col gap-stack-xs">
<h1 class="text-display-xl-mobile md:text-display-xl font-display-xl text-on-surface tracking-tighter">
                    Cyfrow
                </h1>
<p class="text-headline-md font-headline-md text-primary tracking-wide opacity-90 uppercase">
                    Website Speed Analyzer
                </p>
</div>
<!-- Subtext -->
<p class="mt-stack-md text-body-md font-body-md text-on-surface-variant max-w-[320px] mx-auto opacity-60">
                Calibrating performance metrics for the high-performance web.
            </p>
</div>
<!-- Bottom Loading Section -->
<div class="absolute bottom-16 flex flex-col items-center gap-stack-md">
<!-- Glowing Loading Bar -->
<div class="w-48 h-[2px] bg-white/5 rounded-full overflow-hidden relative">
<div class="absolute top-0 left-1/4 w-1/2 h-full bg-primary spinner-glow"></div>
</div>
<!-- Monospace Loading Status -->
<div class="flex items-center gap-stack-sm text-label-mono font-label-mono text-primary/70">
<span class="material-symbols-outlined text-[16px]" data-icon="query_stats">query_stats</span>
<span class="uppercase tracking-widest">Initializing Core Modules...</span>
</div>
</div>
<!-- Ambient Light Accents (HUD Style) -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none">
<div class="absolute top-8 left-8 border-l border-t border-white/10 w-8 h-8"></div>
<div class="absolute top-8 right-8 border-r border-t border-white/10 w-8 h-8"></div>
<div class="absolute bottom-8 left-8 border-l border-b border-white/10 w-8 h-8"></div>
<div class="absolute bottom-8 right-8 border-r border-b border-white/10 w-8 h-8"></div>
</div>
</main>
<!-- Optional Background Image for Contextual Depth -->
<div class="fixed inset-0 -z-10 opacity-10">
<img class="w-full h-full object-cover grayscale brightness-50" data-alt="A macro shot of high-end circuit board traces illuminated by cold blue fiber optic lights in a darkened technology laboratory. The aesthetic is deep black and dark gray with sharp highlights, reflecting a high-performance site reliability engineering environment. The atmosphere is quiet, technical, and precise, matching a command center visual style with minimalist glassmorphism elements and glowing accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSvVWyj-hJttX9fsY6QD6U1a4ksT7BJT6S_60HcFLyzILoSXJ-o70R7TXFaDLGDbni5ZKuYB5XCN8UyTeKQ82J7fwK_ixqziR_f0QKfktT86NjyEfwwmgbcPiYK-InNvb_marMTQoZWjwfQ6B9Nx1J7xvUhKn5AMjpVKiUM8z-4Ze9Xf3m3LRiXP6bS_mn7vT4qEC64-1WxiGjb8H-52beV-RA0Q2HtEyuCzbNvDJR3nkW651M3kXn0_njNOfckG85Gz70atZ9AvNV"/>
</div>
</body></html>
