name: cyfrow_pagespeed_analyzer
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.6.0
  flutter_dotenv: ^6.0.1
  google_fonts: ^8.1.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  animation_tools: ^0.2.8
  animations: ^2.2.0
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21